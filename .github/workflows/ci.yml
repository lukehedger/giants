name: ci

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  test:
    name: test
    timeout-minutes: 15
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Get Bun cache info
        id: bun-cache
        run: |
          echo "dir=$(bun pm cache)" >> "$GITHUB_OUTPUT"
          echo "hash=$(bun pm hash)" >> "$GITHUB_OUTPUT"

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.bun-cache.outputs.dir }}
          key: ${{ runner.os }}-bun-${{ steps.bun-cache.outputs.hash }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run lint
        run: bunx @biomejs/biome ci ./

      - name: Run type check
        run: bun types

      - name: Cache Turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Run unit tests
        run: bun test:unit
